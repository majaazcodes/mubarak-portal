name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: verify (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: [20]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hajj_dev
          POSTGRES_USER: hajj
          POSTGRES_PASSWORD: devonly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hajj -d hajj_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hajj:devonly@localhost:5432/hajj_dev
      TEST_DATABASE_URL: postgresql://hajj:devonly@localhost:5432/hajj_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret_0000000000000000000000000000000000000000000000000000
      JWT_REFRESH_SECRET: ci_refresh_secret_000000000000000000000000000000000000000000000000000
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      NODE_ENV: test
      PORT: "4000"
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: warn

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter api db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
